apiVersion: apps/v1
kind: Deployment
metadata:
  name: resqnet-frontend
  labels:
    app: resqnet-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resqnet-frontend
  template:
    metadata:
      labels:
        app: resqnet-frontend
    spec:
      containers:
        - name: frontend
          image: us-central1-docker.pkg.dev/resqnet-deployment/resqnet/resqnet-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: resqnet-frontend
spec:
  type: ClusterIP
  selector:
    app: resqnet-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
