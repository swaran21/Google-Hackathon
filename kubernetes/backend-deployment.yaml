apiVersion: apps/v1
kind: Deployment
metadata:
  name: resqnet-backend
  labels:
    app: resqnet-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resqnet-backend
  template:
    metadata:
      labels:
        app: resqnet-backend
    spec:
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/resqnet-deployment/resqnet/resqnet-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: resqnet-backend-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: resqnet-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: resqnet-secrets
                  key: JWT_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resqnet-secrets
                  key: GEMINI_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: resqnet-backend
spec:
  type: ClusterIP
  selector:
    app: resqnet-backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
